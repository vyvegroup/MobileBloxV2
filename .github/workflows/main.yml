name: Build MobileBloxV2

on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c
        link-to-sdk: true
        
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build

    - name: Patch source files
      shell: bash
      run: |
        set -e

        # 1. Create logging header
        mkdir -p NativeLib/utils
        cat > NativeLib/utils/logging.hpp << 'EOF'
        #pragma once
        #include <android/log.h>
        #ifndef LOG_TAG
        #define LOG_TAG "MobileBlox"
        #endif
        #define LOGD(...) __android_log_print(ANDROID_LOG_DEBUG, LOG_TAG, __VA_ARGS__)
        #define LOGI(...) __android_log_print(ANDROID_LOG_INFO, LOG_TAG, __VA_ARGS__)
        #define LOGW(...) __android_log_print(ANDROID_LOG_WARN, LOG_TAG, __VA_ARGS__)
        #define LOGE(...) __android_log_print(ANDROID_LOG_ERROR, LOG_TAG, __VA_ARGS__)
        EOF
        sed -i 's/^        //' NativeLib/utils/logging.hpp
        echo "=== Created logging.hpp ==="

        # 2. ALWAYS create exploit_configuration.hpp in utils/
        cat > NativeLib/utils/exploit_configuration.hpp << 'EOF'
        #pragma once
        #include <string>
        
        namespace exploit_configuration {
            const std::string exploit_name = "MobileBlox";
            const std::string exploit_luaChunk = "@MB";
            const std::string exploit_version = "2.0.0";
            const std::string roblox_exploit_version = "2.603.563";
        }
        EOF
        sed -i 's/^        //' NativeLib/utils/exploit_configuration.hpp
        echo "=== Created exploit_configuration.hpp ==="

        # 3. Add jni.h to utils.hpp if missing
        UTILS_FILE="NativeLib/utils/utils.hpp"
        if [ -f "$UTILS_FILE" ]; then
          if ! grep -q '#include <jni.h>' "$UTILS_FILE"; then
            sed -i '1i #include <jni.h>' "$UTILS_FILE"
            echo "Patched utils.hpp with jni.h"
          fi
        fi

        # 4. Patch files using LOGD/LOGI/LOGE/LOGW - add logging include
        find NativeLib/ -type f \( -name "*.cpp" -o -name "*.hpp" -o -name "*.h" \) \
          ! -path "*/dependencies/*" \
          ! -name "logging.hpp" | while read file; do
          if grep -q 'LOGD\|LOGI\|LOGE\|LOGW' "$file"; then
            if ! grep -q 'logging.hpp\|android/log.h\|define LOGD' "$file"; then
              REL_PATH=$(python3 -c "
        import os.path
        src = os.path.dirname('$file')
        dst = 'NativeLib/utils/logging.hpp'
        print(os.path.relpath(dst, src))
        ")
              sed -i "1i #include \"$REL_PATH\"" "$file"
              echo "Patched $file with logging include"
            fi
          fi
        done

        echo "=== Patching complete ==="

    - name: Create CMakeLists.txt
      shell: bash
      run: |
        set -e
        tee NativeLib/CMakeLists.txt > /dev/null <<'CMAKEOF'
        cmake_minimum_required(VERSION 3.16)
        project(MobileBloxV2)
        set(CMAKE_CXX_STANDARD 17)

        # Include directories
        include_directories(
            ${CMAKE_CURRENT_SOURCE_DIR}
            ${CMAKE_CURRENT_SOURCE_DIR}/dependencies
            ${CMAKE_CURRENT_SOURCE_DIR}/dependencies/luau
            ${CMAKE_CURRENT_SOURCE_DIR}/dependencies/luau/VM/include
            ${CMAKE_CURRENT_SOURCE_DIR}/dependencies/luau/VM/src
            ${CMAKE_CURRENT_SOURCE_DIR}/dependencies/luau/Common/include
            ${CMAKE_CURRENT_SOURCE_DIR}/dependencies/luau/Ast/include
            ${CMAKE_CURRENT_SOURCE_DIR}/dependencies/luau/Compiler/include
            ${CMAKE_CURRENT_SOURCE_DIR}/dependencies/curl/include
            ${CMAKE_CURRENT_SOURCE_DIR}/dependencies/cpr/include
            ${CMAKE_CURRENT_SOURCE_DIR}/dependencies/dobby/include
            ${CMAKE_CURRENT_SOURCE_DIR}/dependencies/imgui
            ${CMAKE_CURRENT_SOURCE_DIR}/dependencies/ixwebsocket
            ${CMAKE_CURRENT_SOURCE_DIR}/dependencies/lz4/lib
        )

        # Source files
        file(GLOB LUAU_VM_SRC dependencies/luau/VM/src/*.cpp)
        file(GLOB LUAU_COMPILER_SRC dependencies/luau/Compiler/src/*.cpp)
        file(GLOB LUAU_AST_SRC dependencies/luau/Ast/src/*.cpp)
        file(GLOB_RECURSE SOURCES "*.cpp")
        list(FILTER SOURCES EXCLUDE REGEX "dependencies/luau/.*")

        add_library(mobileblox SHARED
            ${SOURCES}
            ${LUAU_VM_SRC}
            ${LUAU_COMPILER_SRC}
            ${LUAU_AST_SRC}
        )

        target_compile_definitions(mobileblox PRIVATE
            ANDROID
            LUAU_FASTFLAG_LUAERRORRESPONSE
            LOG_TAG="MobileBlox"
        )

        # Pre-built static libraries
        set(CURL_LIB_DIR ${CMAKE_CURRENT_SOURCE_DIR}/dependencies/curl/armeabi-v7a)
        set(DOBBY_LIB_DIR ${CMAKE_CURRENT_SOURCE_DIR}/dependencies/dobby/armeabi-v7a)

        add_library(curl_static STATIC IMPORTED)
        set_target_properties(curl_static PROPERTIES IMPORTED_LOCATION ${CURL_LIB_DIR}/libcurl_static.a)

        add_library(crypto_static STATIC IMPORTED)
        set_target_properties(crypto_static PROPERTIES IMPORTED_LOCATION ${CURL_LIB_DIR}/libcrypto_static.a)

        add_library(ssl_static STATIC IMPORTED)
        set_target_properties(ssl_static PROPERTIES IMPORTED_LOCATION ${CURL_LIB_DIR}/libssl_static.a)

        add_library(nghttp2_static STATIC IMPORTED)
        set_target_properties(nghttp2_static PROPERTIES IMPORTED_LOCATION ${CURL_LIB_DIR}/libnghttp2_static.a)

        add_library(nghttp3_static STATIC IMPORTED)
        set_target_properties(nghttp3_static PROPERTIES IMPORTED_LOCATION ${CURL_LIB_DIR}/libnghttp3_static.a)

        add_library(ngtcp2_static STATIC IMPORTED)
        set_target_properties(ngtcp2_static PROPERTIES IMPORTED_LOCATION ${CURL_LIB_DIR}/libngtcp2_static.a)

        add_library(ngtcp2_crypto_static STATIC IMPORTED)
        set_target_properties(ngtcp2_crypto_static PROPERTIES IMPORTED_LOCATION ${CURL_LIB_DIR}/libngtcp2_crypto_static.a)

        add_library(dobby STATIC IMPORTED)
        set_target_properties(dobby PROPERTIES IMPORTED_LOCATION ${DOBBY_LIB_DIR}/libdobby.a)

        # System libraries
        find_library(log-lib log)
        find_library(android-lib android)
        find_library(z-lib z)
        find_library(m-lib m)
        find_library(EGL-lib EGL)
        find_library(GLESv3-lib GLESv3)

        # Link everything
        target_link_libraries(mobileblox
            ${log-lib}
            ${android-lib}
            ${z-lib}
            ${m-lib}
            ${EGL-lib}
            ${GLESv3-lib}
            curl_static
            crypto_static
            ssl_static
            nghttp2_static
            nghttp3_static
            ngtcp2_static
            ngtcp2_crypto_static
            dobby
            c++_shared
        )
        CMAKEOF
        sed -i 's/^        //' NativeLib/CMakeLists.txt
        echo "=== CMakeLists.txt created ==="

    - name: Build ARM32
      shell: bash
      run: |
        set -eo pipefail
        cd NativeLib
        rm -rf build-arm32
        mkdir -p build-arm32 && cd build-arm32
        cmake -G Ninja \
              -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
              -DANDROID_ABI=armeabi-v7a \
              -DANDROID_PLATFORM=android-21 \
              -DCMAKE_BUILD_TYPE=Release \
              .. 2>&1 | tee cmake.log
        ninja 2>&1 | tee build.log
        BUILD_EXIT=${PIPESTATUS[0]}
        echo "=== Build exit code: $BUILD_EXIT ==="
        find . -name "*.so" -type f
        if [ $BUILD_EXIT -ne 0 ]; then
          echo "=== BUILD FAILED ==="
          tail -50 build.log
          exit 1
        fi

    - name: Prepare artifacts
      run: |
        mkdir -p artifacts
        find NativeLib/ -name "libmobileblox.so" -exec cp {} artifacts/ \;
        ls -la artifacts/
        if [ -z "$(ls -A artifacts/)" ]; then
          echo "ERROR: No .so file found!"
          exit 1
        fi

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mobileblox-lib
        path: artifacts/
        retention-days: 7
        if-no-files-found: error

    - name: Upload build logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-logs
        path: |
          NativeLib/build-arm32/build.log
          NativeLib/build-arm32/cmake.log
        retention-days: 3
        if-no-files-found: ignore
