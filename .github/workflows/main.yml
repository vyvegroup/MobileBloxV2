name: Build MobileBloxV2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c
        link-to-sdk: true

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build

    - name: Write patch script
      run: |
        cat > /tmp/patch.py << 'PYEOF'
        import os
        import subprocess

        os.makedirs("NativeLib/utils", exist_ok=True)

        # Create logging.hpp
        with open("NativeLib/utils/logging.hpp", "w") as f:
            f.write('#pragma once\n')
            f.write('#include <android/log.h>\n')
            f.write('#ifndef LOG_TAG\n#define LOG_TAG "MobileBlox"\n#endif\n')
            f.write('#define LOGD(...) __android_log_print(ANDROID_LOG_DEBUG, LOG_TAG, __VA_ARGS__)\n')
            f.write('#define LOGI(...) __android_log_print(ANDROID_LOG_INFO, LOG_TAG, __VA_ARGS__)\n')
            f.write('#define LOGW(...) __android_log_print(ANDROID_LOG_WARN, LOG_TAG, __VA_ARGS__)\n')
            f.write('#define LOGE(...) __android_log_print(ANDROID_LOG_ERROR, LOG_TAG, __VA_ARGS__)\n')
        print("Created logging.hpp")

        # Create exploit_configuration.hpp
        with open("NativeLib/utils/exploit_configuration.hpp", "w") as f:
            f.write('#pragma once\n')
            f.write('#include <string>\n\n')
            f.write('namespace exploit_configuration {\n')
            f.write('    const std::string exploit_name = "MobileBlox";\n')
            f.write('    const std::string exploit_luaChunk = "@MB";\n')
            f.write('    const std::string exploit_version = "2.0.0";\n')
            f.write('    const std::string roblox_exploit_version = "2.603.563";\n')
            f.write('}\n')
        print("Created exploit_configuration.hpp")

        # Patch utils.hpp with jni.h
        utils_hpp = "NativeLib/utils/utils.hpp"
        if os.path.exists(utils_hpp):
            with open(utils_hpp, "r") as f:
                content = f.read()
            if '#include <jni.h>' not in content:
                content = '#include <jni.h>\n' + content
                with open(utils_hpp, "w") as f:
                    f.write(content)
                print("Patched utils.hpp with jni.h")

        # Find all source files (non-dependency)
        source_files = []
        for root, dirs, files in os.walk("NativeLib"):
            if "dependencies" in root:
                continue
            for fname in files:
                if fname.endswith((".cpp", ".hpp", ".h")):
                    source_files.append(os.path.join(root, fname))

        for filepath in source_files:
            fname = os.path.basename(filepath)
            if fname in ("logging.hpp", "exploit_configuration.hpp"):
                continue

            with open(filepath, "r") as f:
                content = f.read()

            original = content

            # Add logging include if needed
            if any(m in content for m in ("LOGD", "LOGI", "LOGE", "LOGW")):
                if "logging.hpp" not in content and "android/log.h" not in content and "#define LOGD" not in content:
                    rel = os.path.relpath("NativeLib/utils/logging.hpp", os.path.dirname(filepath))
                    content = f'#include "{rel}"\n' + content

            # Add exploit_configuration include if needed
            if "exploit_configuration::" in content:
                if "exploit_configuration.hpp" not in content and "pch.hpp" not in content:
                    rel = os.path.relpath("NativeLib/utils/exploit_configuration.hpp", os.path.dirname(filepath))
                    content = f'#include "{rel}"\n' + content

            if content != original:
                with open(filepath, "w") as f:
                    f.write(content)
                print(f"Patched: {filepath}")
        PYEOF

    - name: Patch source files
      run: python3 /tmp/patch.py

    - name: Write CMake script
      run: |
        cat > /tmp/gen_cmake.py << 'PYEOF'
        content = """cmake_minimum_required(VERSION 3.16)
        project(MobileBloxV2)
        set(CMAKE_CXX_STANDARD 17)

        include_directories(
            ${CMAKE_CURRENT_SOURCE_DIR}
            ${CMAKE_CURRENT_SOURCE_DIR}/dependencies
            ${CMAKE_CURRENT_SOURCE_DIR}/dependencies/luau
            ${CMAKE_CURRENT_SOURCE_DIR}/dependencies/luau/VM/include
            ${CMAKE_CURRENT_SOURCE_DIR}/dependencies/luau/VM/src
            ${CMAKE_CURRENT_SOURCE_DIR}/dependencies/luau/Common/include
            ${CMAKE_CURRENT_SOURCE_DIR}/dependencies/luau/Ast/include
            ${CMAKE_CURRENT_SOURCE_DIR}/dependencies/luau/Compiler/include
            ${CMAKE_CURRENT_SOURCE_DIR}/dependencies/curl/include
            ${CMAKE_CURRENT_SOURCE_DIR}/dependencies/cpr/include
            ${CMAKE_CURRENT_SOURCE_DIR}/dependencies/dobby/include
            ${CMAKE_CURRENT_SOURCE_DIR}/dependencies/imgui
            ${CMAKE_CURRENT_SOURCE_DIR}/dependencies/ixwebsocket
            ${CMAKE_CURRENT_SOURCE_DIR}/dependencies/lz4/lib
        )

        file(GLOB LUAU_VM_SRC dependencies/luau/VM/src/*.cpp)
        file(GLOB LUAU_COMPILER_SRC dependencies/luau/Compiler/src/*.cpp)
        file(GLOB LUAU_AST_SRC dependencies/luau/Ast/src/*.cpp)
        file(GLOB_RECURSE SOURCES "*.cpp")
        list(FILTER SOURCES EXCLUDE REGEX "dependencies/luau/.*")

        add_library(mobileblox SHARED
            ${SOURCES}
            ${LUAU_VM_SRC}
            ${LUAU_COMPILER_SRC}
            ${LUAU_AST_SRC}
        )

        target_compile_definitions(mobileblox PRIVATE
            ANDROID
            LUAU_FASTFLAG_LUAERRORRESPONSE
            LOG_TAG="MobileBlox"
        )

        set(CURL_LIB_DIR ${CMAKE_CURRENT_SOURCE_DIR}/dependencies/curl/armeabi-v7a)
        set(DOBBY_LIB_DIR ${CMAKE_CURRENT_SOURCE_DIR}/dependencies/dobby/armeabi-v7a)

        add_library(curl_static STATIC IMPORTED)
        set_target_properties(curl_static PROPERTIES IMPORTED_LOCATION ${CURL_LIB_DIR}/libcurl_static.a)
        add_library(crypto_static STATIC IMPORTED)
        set_target_properties(crypto_static PROPERTIES IMPORTED_LOCATION ${CURL_LIB_DIR}/libcrypto_static.a)
        add_library(ssl_static STATIC IMPORTED)
        set_target_properties(ssl_static PROPERTIES IMPORTED_LOCATION ${CURL_LIB_DIR}/libssl_static.a)
        add_library(nghttp2_static STATIC IMPORTED)
        set_target_properties(nghttp2_static PROPERTIES IMPORTED_LOCATION ${CURL_LIB_DIR}/libnghttp2_static.a)
        add_library(nghttp3_static STATIC IMPORTED)
        set_target_properties(nghttp3_static PROPERTIES IMPORTED_LOCATION ${CURL_LIB_DIR}/libnghttp3_static.a)
        add_library(ngtcp2_static STATIC IMPORTED)
        set_target_properties(ngtcp2_static PROPERTIES IMPORTED_LOCATION ${CURL_LIB_DIR}/libngtcp2_static.a)
        add_library(ngtcp2_crypto_static STATIC IMPORTED)
        set_target_properties(ngtcp2_crypto_static PROPERTIES IMPORTED_LOCATION ${CURL_LIB_DIR}/libngtcp2_crypto_static.a)
        add_library(dobby STATIC IMPORTED)
        set_target_properties(dobby PROPERTIES IMPORTED_LOCATION ${DOBBY_LIB_DIR}/libdobby.a)

        find_library(log-lib log)
        find_library(android-lib android)
        find_library(z-lib z)
        find_library(m-lib m)
        find_library(EGL-lib EGL)
        find_library(GLESv3-lib GLESv3)

        target_link_libraries(mobileblox
            ${log-lib}
            ${android-lib}
            ${z-lib}
            ${m-lib}
            ${EGL-lib}
            ${GLESv3-lib}
            curl_static
            crypto_static
            ssl_static
            nghttp2_static
            nghttp3_static
            ngtcp2_static
            ngtcp2_crypto_static
            dobby
            c++_shared
        )
        """
        # Dedent the content
        lines = content.split('\n')
        min_indent = 999
        for line in lines:
            if line.strip():
                min_indent = min(min_indent, len(line) - len(line.lstrip()))
        if min_indent < 999:
            lines = [line[min_indent:] if len(line) >= min_indent else line for line in lines]
        with open("NativeLib/CMakeLists.txt", "w") as f:
            f.write('\n'.join(lines))
        print("CMakeLists.txt created")
        PYEOF

    - name: Create CMakeLists.txt
      run: python3 /tmp/gen_cmake.py

    - name: Build ARM32
      shell: bash
      run: |
        set -eo pipefail
        cd NativeLib
        rm -rf build-arm32
        mkdir -p build-arm32 && cd build-arm32
        cmake -G Ninja \
              -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
              -DANDROID_ABI=armeabi-v7a \
              -DANDROID_PLATFORM=android-21 \
              -DCMAKE_BUILD_TYPE=Release \
              .. 2>&1 | tee cmake.log
        ninja 2>&1 | tee build.log
        BUILD_EXIT=${PIPESTATUS[0]}
        echo "=== Build exit code: $BUILD_EXIT ==="
        find . -name "*.so" -type f
        if [ $BUILD_EXIT -ne 0 ]; then
          echo "=== BUILD FAILED ==="
          tail -80 build.log
          exit 1
        fi

    - name: Prepare artifacts
      run: |
        mkdir -p artifacts
        find NativeLib/ -name "libmobileblox.so" -exec cp {} artifacts/ \;
        ls -la artifacts/
        if [ -z "$(ls -A artifacts/)" ]; then
          echo "ERROR: No .so file found!"
          exit 1
        fi

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mobileblox-lib
        path: artifacts/
        retention-days: 7
        if-no-files-found: error

    - name: Upload build logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-logs
        path: |
          NativeLib/build-arm32/build.log
          NativeLib/build-arm32/cmake.log
        retention-days: 3
        if-no-files-found: ignore
